<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#242424" />
  
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WF Activator" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Watchface QR Activator</title>
  <style>
    :root {
      --bg:       #1a1a1a;
      --surface:  #242424;
      --surface2: #2e2e2e;
      --border:   #3a3a3a;
      --text:     #e8e8e8;
      --muted:    #888;
      --green:    #4CAF50;
      --red:      #ef5350;
      --orange:   #ffa726;
      --accent:   #5d5d5d;
      --sel:      #4a90d9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh; /* Lock to viewport */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .5px; }

    /* COMPACT SETUP BAR */
    #setupBar {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .setup-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .setup-btn:active { background: var(--accent); }
    .setup-btn.ok { border-color: var(--green); color: var(--green); }
    
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
    .status-dot.ok { background: var(--green); }
    .status-dot.warn { background: var(--orange); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* WATCHFACE LIST AREA */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 14px;
      gap: 10px;
      overflow: hidden; /* Prevent body scroll */
    }

    .list-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .list-toolbar span { font-size: .75rem; color: var(--muted); }
    
    #watchFilter {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .8rem;
      padding: 6px 8px;
      outline: none;
      flex: 1;
      margin-right: 8px;
    }

    .toolbar-btns { display: flex; gap: 6px; }
    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .8rem;
      padding: 6px 10px;
      cursor: pointer;
    }
    .icon-btn:active { background: var(--accent); }

    .list-container {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    
    #watchList { list-style: none; display: flex; flex-direction: column; }
    #watchList li {
      padding: 12px 14px;
      cursor: pointer;
      font-size: .9rem;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    #watchList li:last-child { border-bottom: none; }
    #watchList li:active { background: var(--surface2); }
    #watchList li.selected { background: #1c3a5e; border-bottom-color: #2a5080; }
    #watchList li .wf-name { font-weight: 500; }
    #watchList li .wf-meta { font-size: .75rem; color: var(--muted); }
    #watchList li.selected .wf-meta { color: #90caf9; }
    
    .empty-msg { text-align: center; color: var(--muted); font-size: .85rem; padding: 20px; }

    /* BOTTOM CONTROLS (Sticky) */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 14px 20px; /* Extra bottom padding for safe area */
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* DURATION PRESETS */
    #presets { display: flex; gap: 6px; }
    .preset-btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 8px;
      background: var(--surface2);
      border: 1.5px solid transparent;
      color: var(--text);
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .12s;
    }
    .preset-btn.active { border-color: var(--sel); background: #1c3a5e; }
    .preset-btn:active { background: var(--accent); }

    /* ACTION BUTTONS */
    #actions { display: flex; gap: 8px; }
    .action-btn {
      flex: 1;
      padding: 12px 6px;
      border-radius: 10px;
      border: none;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      white-space: nowrap;
    }
    .action-btn:disabled { opacity: .3; cursor: not-allowed; }
    .action-btn:not(:disabled):active { filter: brightness(.85); }
    #unlockBtn       { background: #2e6b31; color: #a5d6a7; }
    #lockCurrentBtn  { background: #4a4a4a; color: #e8e8e8; }
    #lockAllBtn      { background: #7a1a1a; color: #ef9a9a; }

    /* TIMER */
    #timerCard { display: none; margin-top: 4px; }
    #timerCard.visible { display: block; }
    .timer-row { display: flex; align-items: center; gap: 12px; }
    #progressWrap {
      flex: 1;
      background: var(--surface2);
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
    }
    #progressBar {
      height: 100%;
      background: var(--sel);
      border-radius: 8px;
      width: 0%;
      transition: width .5s linear;
    }
    #timerDisplay {
      font-size: 1.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      min-width: 60px;
      text-align: right;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(40,40,40,0.95);
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: .85rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all .25s ease;
      z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    #folderInput { display: none; }
  </style>
</head>
<body>

<header>
  <h1>🕐 Watchfaces QR Activator</h1>
  <span id="selCount">0 selected</span>
</header>

<div id="setupBar">
  <input type="file" id="folderInput" webkitdirectory directory multiple />
  
  <button id="folderBtn" class="setup-btn" onclick="document.getElementById('folderInput').click()">
    <div id="fileDot" class="status-dot"></div>
    📂 Load data
  </button>
  
  <button id="connectBtn" class="setup-btn" onclick="startAuthRedirect()">
    <div id="driveDot" class="status-dot"></div>
    🔑 Connect to Drive
  </button>
</div>

<main>
  <div class="list-toolbar">
    <select id="watchFilter" onchange="renderList()">
      <option value="all">All Watches</option>
    </select>
    <div class="toolbar-btns">
      <button class="icon-btn" onclick="selectAll()">✓ All</button>
    </div>
  </div>

  <div class="list-container">
    <ul id="watchList">
      <li><div class="empty-msg">Load folder containing data to begin</div></li>
    </ul>
  </div>
</main>

<footer>
  <div id="presets">
    <button class="preset-btn" data-min="1"  onclick="setDuration(1)">1m</button>
    <button class="preset-btn" data-min="3"  onclick="setDuration(3)">3m</button>
    <button class="preset-btn active" data-min="5" onclick="setDuration(5)">5m</button>
    <button class="preset-btn" data-min="10" onclick="setDuration(10)">10m</button>
  </div>

  <div id="actions">
    <button id="unlockBtn" class="action-btn" onclick="doUnlock()" disabled>🔓 Unlock</button>
    <button id="lockCurrentBtn" class="action-btn" onclick="doLockCurrent()" disabled>🔒 Lock Current</button>
    <button id="lockAllBtn" class="action-btn" onclick="doLockAll()" disabled>🔐 Lock All</button>
  </div>

  <div id="timerCard">
    <div class="timer-row">
      <div id="progressWrap"><div id="progressBar"></div></div>
      <div id="timerDisplay">--:--</div>
    </div>
  </div>
</footer>

<div id="toast"></div>

<script>
// --- Embedded Watch Mapping ---
const WATCH_MAP = {
  "bip6": "Amazfit Bip 6",
  "activemax": "Amazfit Active Max",
  "bipmax": "Amazfit Bip Max"
};

function getWatchName(id) {
  return WATCH_MAP[id.toLowerCase()] || id;
}

let accessToken   = null;
let credentials   = null;
let watchfaces    = {};
let watchfaceText = null;
let selectedNames = new Set();
let activeWFs     = [];
let durMinutes    = 5;
let timerInterval = null;
let remainingMs   = 0;
let totalMs       = 0;
let timerRunning  = false;
let hasCreds      = false;
let hasWfs        = false;
let isProcessing  = false;

const SCOPES       = 'https://www.googleapis.com/auth/drive';
const LS_CRED_KEY  = 'wfa_credentials';
const LS_WF_KEY    = 'wfa_watchfaces';
const LS_TOKEN_KEY = 'wfa_token_expiry'; 

window.addEventListener('DOMContentLoaded', function() {
  handleOAuthRedirect();
  restoreFromCache();
});

function handleOAuthRedirect() {
  const hash = window.location.hash;
  if (!hash || !hash.includes('access_token')) return;
  const params = {};
  hash.slice(1).split('&').forEach(function(part) {
    const kv = part.split('=');
    params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '');
  });
  if (params.access_token) {
    accessToken = params.access_token;
    const expiry = Date.now() + (parseInt(params.expires_in || 3600) - 60) * 1000;
    try { localStorage.setItem(LS_TOKEN_KEY, JSON.stringify({ token: accessToken, expiry: expiry })); } catch(e) {}
    history.replaceState(null, '', window.location.pathname + window.location.search);
    document.getElementById('driveDot').className = 'status-dot ok';
    document.getElementById('connectBtn').classList.add('ok');
    updateActionBtns();
    toast('✅ Drive Connected');
  }
}

function restoreFromCache() {
  try {
    const rawTok = localStorage.getItem(LS_TOKEN_KEY);
    if (rawTok) {
      const obj = JSON.parse(rawTok);
      if (obj.token && obj.expiry > Date.now()) {
        accessToken = obj.token;
        document.getElementById('driveDot').className = 'status-dot ok';
        document.getElementById('connectBtn').classList.add('ok');
        updateActionBtns();
      }
    }
  } catch(e) {}

  try {
    if (localStorage.getItem(LS_CRED_KEY)) { credentials = JSON.parse(localStorage.getItem(LS_CRED_KEY)); hasCreds = true; }
    if (localStorage.getItem(LS_WF_KEY)) { watchfaceText = localStorage.getItem(LS_WF_KEY); hasWfs = true; }
    
    if (hasCreds && hasWfs) {
      document.getElementById('fileDot').className = 'status-dot ok';
      document.getElementById('folderBtn').classList.add('ok');
      reloadList();
    }
  } catch(e) {}
}

// FOLDER PICKER LOGIC
document.getElementById('folderInput').addEventListener('change', async function(e) {
  const files = e.target.files;
  if (!files.length) return;
  
  let foundCreds = false;
  let foundWFs = false;

  for (let file of files) {
    if (file.name === 'credentials.json') {
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        credentials = parsed.installed || parsed.web;
        localStorage.setItem(LS_CRED_KEY, JSON.stringify(credentials));
        foundCreds = true;
        hasCreds = true;
      } catch(err) { toast('Error parsing credentials'); }
    }
    if (file.name === 'watchfaces.txt') {
      try {
        watchfaceText = await file.text();
        localStorage.setItem(LS_WF_KEY, watchfaceText);
        foundWFs = true;
        hasWfs = true;
      } catch(err) { toast('Error reading watchfaces'); }
    }
  }

  if (foundCreds && foundWFs) {
    document.getElementById('fileDot').className = 'status-dot ok';
    document.getElementById('folderBtn').classList.add('ok');
    reloadList();
    toast('✅ Folder Data Loaded');
  } else if (foundWFs) {
    reloadList();
    toast('⚠️ Missing credentials.json');
  } else if (foundCreds) {
    toast('⚠️ Missing watchfaces.txt');
  } else {
    toast('❌ Neither file found in folder');
  }
});

function startAuthRedirect() {
  if (!credentials) return toast('Load folder with credentials.json first!');
  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth' +
    '?client_id=' + encodeURIComponent(credentials.client_id) +
    '&redirect_uri=' + encodeURIComponent(window.location.origin + window.location.pathname) +
    '&response_type=token' +
    '&scope=' + encodeURIComponent(SCOPES);
  window.location.href = authUrl;
}

function parseWatchfaces(text) {
  const result = {};
  text.split('\n').forEach(line => {
    line = line.trim();
    if (!line || line.startsWith('#')) return;
    const parts = line.split('|').map(p => p.trim());
    if (parts.length >= 2) {
      result[parts[0]] = { id: parts[1].replace(/(?:id=|[ /]d\/)([a-zA-Z0-9_-]+)/, '$1'), watch_id: parts[3] || 'unknown' };
    }
  });
  return result;
}

function reloadList() {
  if (!watchfaceText) return;
  watchfaces = parseWatchfaces(watchfaceText);
  selectedNames.clear();
  populateFilter();
  renderList();
}

function populateFilter() {
  const filterEl = document.getElementById('watchFilter');
  const ids = new Set(Object.values(watchfaces).map(w => w.watch_id));
  filterEl.innerHTML = '<option value="all">All Watches</option>';
  Array.from(ids).sort().forEach(id => {
    const opt = document.createElement('option');
    opt.value = id; 
    opt.textContent = getWatchName(id);
    filterEl.appendChild(opt);
  });
}

function renderList() {
  const ul = document.getElementById('watchList');
  const filterVal = document.getElementById('watchFilter').value;
  ul.innerHTML = '';
  Object.keys(watchfaces).sort().forEach(name => {
    if (filterVal === 'all' || watchfaces[name].watch_id === filterVal) {
      const li = document.createElement('li');
      li.className = selectedNames.has(name) ? 'selected' : '';
      
      const niceName = getWatchName(watchfaces[name].watch_id);
      
      li.innerHTML = `<span class="wf-name">${name}</span><span class="wf-meta">${niceName}</span>`;
      li.onclick = () => {
        selectedNames.has(name) ? selectedNames.delete(name) : selectedNames.add(name);
        renderList(); updateSelCount(); updateActionBtns();
      };
      ul.appendChild(li);
    }
  });
}

function selectAll() {
  const filterVal = document.getElementById('watchFilter').value;
  const targetNames = Object.keys(watchfaces).filter(name => filterVal === 'all' || watchfaces[name].watch_id === filterVal);
  
  // Toggle behavior: if all visible are selected, deselect them. Otherwise select all.
  const allSelected = targetNames.every(name => selectedNames.has(name));
  targetNames.forEach(name => allSelected ? selectedNames.delete(name) : selectedNames.add(name));
  
  renderList(); updateSelCount(); updateActionBtns();
}

function updateSelCount() { document.getElementById('selCount').textContent = selectedNames.size + ' selected'; }

function setDuration(min) {
  durMinutes = min;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.min) === min));
  if (timerRunning) { remainingMs += (min - 5) * 60 * 1000; totalMs += (min - 5) * 60 * 1000; }
}

async function doUnlock() {
  if (isProcessing) return;
  isProcessing = true;
  updateActionBtns();

  activeWFs = [];
  for (const name of selectedNames) {
    try {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${watchfaces[name].id}/permissions`, {
        method: 'POST', headers: {'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json'},
        body: JSON.stringify({type: 'anyone', role: 'reader'})
      });
      if (res.ok) activeWFs.push({name, id: watchfaces[name].id});
    } catch(e) { console.error(e); }
  }

  isProcessing = false;
  if (activeWFs.length > 0) {
    document.getElementById('timerCard').classList.add('visible');
    startCountdown();
    toast('Unlocked ' + activeWFs.length + ' files');
  } else {
    toast('❌ Failed to unlock files');
  }
  updateActionBtns();
}

function startCountdown() {
  remainingMs = durMinutes * 60 * 1000; totalMs = remainingMs;
  timerRunning = true;
  
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    remainingMs -= 1000;
    const m = Math.floor(remainingMs/60000), s = Math.floor((remainingMs%60000)/1000);
    document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById('progressBar').style.width = (100 - (remainingMs/totalMs)*100) + '%';
    
    if (remainingMs <= 0) { 
      clearInterval(timerInterval); 
      timerRunning = false;
      isProcessing = true;
      updateActionBtns();
      lockActiveWFs().then(() => {
        document.getElementById('timerCard').classList.remove('visible');
        toast('Timer expired. Session locked.');
        activeWFs = [];
        isProcessing = false;
        updateActionBtns();
      });
    }
  }, 1000);
}

async function lockActiveWFs() {
  for (const wf of activeWFs) {
    try {
      const listRes = await fetch(`https://www.googleapis.com/drive/v3/files/${wf.id}/permissions`, {
        headers: {'Authorization': 'Bearer ' + accessToken}
      });
      if (listRes.ok) {
        const list = await listRes.json();
        const p = list.permissions?.find(p => p.type === 'anyone');
        if (p) await fetch(`https://www.googleapis.com/drive/v3/files/${wf.id}/permissions/${p.id}`, {method: 'DELETE', headers: {'Authorization': 'Bearer ' + accessToken}});
      }
    } catch(e) { console.error(e); }
  }
}

async function doLockCurrent() {
  if (isProcessing) return;
  isProcessing = true;
  updateActionBtns();
  
  if (timerInterval) clearInterval(timerInterval);
  timerRunning = false;
  
  await lockActiveWFs();
  
  document.getElementById('timerCard').classList.remove('visible');
  toast('Locked ' + activeWFs.length + ' active files');
  activeWFs = []; 
  
  isProcessing = false;
  updateActionBtns();
}

async function doLockAll() {
  if (isProcessing) return;
  if (!confirm("Make all loaded watchfaces private?")) return;
  
  isProcessing = true;
  updateActionBtns();
  
  if (timerInterval) clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timerCard').classList.remove('visible');
  
  toast('🔒 Locking everything...');
  
  const allWfs = Object.values(watchfaces);
  let lockedCount = 0;
  
  for (const wf of allWfs) {
    try {
      const listRes = await fetch(`https://www.googleapis.com/drive/v3/files/${wf.id}/permissions`, {
        headers: {'Authorization': 'Bearer ' + accessToken}
      });
      if (listRes.ok) {
        const list = await listRes.json();
        const p = list.permissions?.find(p => p.type === 'anyone');
        if (p) {
          await fetch(`https://www.googleapis.com/drive/v3/files/${wf.id}/permissions/${p.id}`, {method: 'DELETE', headers: {'Authorization': 'Bearer ' + accessToken}});
          lockedCount++;
        }
      }
    } catch(e) { console.error(e); }
  }
  
  toast('🔐 All Locked (' + lockedCount + ' files modified)');
  activeWFs = [];
  
  isProcessing = false;
  updateActionBtns();
}

function updateActionBtns() { 
  const hasToken = !!accessToken;
  const totalLoaded = Object.keys(watchfaces).length;
  
  if (isProcessing) {
    document.getElementById('unlockBtn').disabled = true;
    document.getElementById('lockCurrentBtn').disabled = true;
    document.getElementById('lockAllBtn').disabled = true;
    return;
  }
  
  // Unlock: Requires selection and that the timer isn't running
  document.getElementById('unlockBtn').disabled = !hasToken || selectedNames.size === 0 || timerRunning; 
  
  // Lock Current: Requires an active session (timer running or files pending lock)
  document.getElementById('lockCurrentBtn').disabled = !hasToken || activeWFs.length === 0;
  
  // Lock All: Depends only on being connected to Drive
  document.getElementById('lockAllBtn').disabled = !hasToken;
}

function toast(msg) { 
  const t = document.getElementById('toast'); 
  t.textContent = msg; 
  t.classList.add('show'); 
  setTimeout(()=>t.classList.remove('show'), 2500); 
}

// Register Service Worker for PWA support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker registered', reg))
      .catch(err => console.error('Service Worker registration failed', err));
  });
}
</script>
</body>
</html>
